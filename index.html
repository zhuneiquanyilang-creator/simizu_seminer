<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>清水研究室 輪読サポート｜ログイン</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <section id="view-login">
    <div class="login-card">
      <h1 id="login-title">清水研究室</h1>
      <p id="login-sub" class="muted">非線形ダイナミクスとカオス 輪読</p>
      <form id="login-form">
        <label for="password">合言葉</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="合言葉を入力" />
        <button type="submit" id="login-btn">入室</button>
        <p id="login-error" class="error" hidden></p>
      </form>
      <p class="muted small" id="login-note">※ 合言葉は輪読会メンバーに共有されています</p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
