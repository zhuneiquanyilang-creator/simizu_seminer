<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>清水研究室 輪読サポート</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- 共通ヘッダー -->
  <header id="app-header">
    <div class="header-inner">
      <span class="brand" id="brand">清水研究室</span>
      <span class="brand-sub" id="brand-sub">非線形ダイナミクスとカオス</span>
      <span class="spacer"></span>
      <span id="mode-badge" class="badge" hidden>デモモード</span>
      <button id="logout-btn" class="link-btn">ログアウト</button>
    </div>
  </header>

  <!-- ② 担当一覧 -->
  <main id="view-list" class="container">
    <div id="next-banner" class="next-banner" hidden></div>

    <div class="filters">
      <label>担当者
        <select id="filter-assignee"><option value="">全員</option></select>
      </label>
      <label>状態
        <select id="filter-status">
          <option value="">すべて</option>
          <option value="担当未決定">担当未決定</option>
          <option value="準備中">準備中</option>
          <option value="未完了">未完了</option>
          <option value="発表済み">発表済み</option>
        </select>
      </label>
      <label>検索
        <input type="search" id="filter-text" placeholder="節タイトルで検索" />
      </label>
    </div>

    <div id="chapters"></div>
  </main>

  <!-- ③ 節の詳細 + レジュメ -->
  <main id="view-detail" class="container" hidden>
    <button id="back-btn" class="link-btn">← 一覧に戻る</button>

    <h2 id="detail-title"></h2>
    <p id="detail-meta" class="muted"></p>

    <div class="card">
      <div class="field-row">
        <label>担当者
          <input type="text" id="d-assignee" list="assignee-options" placeholder="氏名を入力" />
          <datalist id="assignee-options"></datalist>
        </label>
        <label>発表日
          <input type="date" id="d-date" />
        </label>
        <label>状態
          <select id="d-status">
            <option value="担当未決定">担当未決定</option>
            <option value="準備中">準備中</option>
            <option value="未完了">未完了</option>
            <option value="発表済み">発表済み</option>
          </select>
        </label>
        <button id="d-save" class="primary">保存</button>
        <span id="d-saved" class="saved" hidden>保存しました</span>
      </div>
    </div>

    <div class="card">
      <h3>レジュメ（PDF）</h3>
      <ul id="resume-list" class="resume-list"></ul>
      <p id="resume-empty" class="muted" hidden>まだレジュメがありません。</p>

      <div class="upload-box">
        <input type="file" id="file-input" accept="application/pdf" />
        <div class="upload-row">
          <input type="text" id="uploader" placeholder="投稿者名（任意）" />
          <button id="upload-btn" class="primary">アップロード</button>
        </div>
        <p class="muted small">※ PDFのみ・1ファイル <span id="max-mb">20</span>MB まで</p>
        <p id="upload-msg" class="muted small" hidden></p>
      </div>
    </div>

    <div class="card muted-card">
      <h3>補足メモ</h3>
      <p class="muted small">参考リンクや式の補足を残せる機能は今後追加予定です（MVPでは未実装）。</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/toc-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
